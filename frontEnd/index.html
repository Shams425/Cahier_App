<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Restaurant POS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/animate.min.css">
    <link rel="stylesheet" href="style/style.css" />
</head>

<body>

    <!-- TOP BAR -->
    <header class="topbar">
        <div class="logo">🍽 POS</div>

        <nav class="nav">
            <button class="nav-btn active">POS | المبيعات</button>
            <button class="nav-btn">Tables | الطاولات</button>
            <button class="nav-btn">Orders | الطلبات</button>
            <button class="nav-btn">Reports | التقارير</button>
        </nav>

        <div class="user">
            Admin | خروج
        </div>
    </header>

    <!-- MAIN -->
    <main class="container">

        <!-- CATEGORIES -->
        <aside class="categories">
            <button class="cat-btn active" data-category="all">POS | المبيعات</button>
            <button class="cat-btn" data-category="drinks">Drinks | مشروبات</button>
            <button class="cat-btn" data-category="food">Meals | وجبات</button>
            <button class="cat-btn" data-category="desserts">Desserts | حلويات</button>
        </aside>

        <!-- PRODUCTS -->
        <section class="products" id="products"></section>

        <!-- ORDER -->
        <aside class="order">
            <h3>Current Order | الحالي</h3>

            <ul class="order-items">
                <li>Burger × 2 <span>50.00</span></li>
                <li>Cola × 1 <span>10.00</span></li>
            </ul>

            <div class="total">
                Total: <span>60.00</span>
            </div>

            <div class="orderAction">
                <button class="btn pay">دفع</button>
                <button class="btn hold">تعليق</button>
                <button class="btn cancel">إلغاء</button>
            </div>
        </aside>

    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
